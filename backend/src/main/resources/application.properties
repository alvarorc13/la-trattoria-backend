# Configuración de la base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/latrattoria?useSSL=false&serverTimezone=UTC
spring.datasource.username=usuario
spring.datasource.password=contraseña
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Puerto del servidor
server.port=8080

# JWT (clave secreta de ejemplo, cambia en producción)
jwt.secret=latrattoriaSecretKey1234567890
jwt.expiration=28800000 # 8 horas en ms
